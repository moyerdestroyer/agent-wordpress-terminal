#:schema vendor/carthage-software/mago/schema.json
version = "1"
php-version = "8.4"

[source]
paths = ["src", "agent-wordpress-terminal.php"]
# `includes` are parsed for symbol/type resolution but never analyzed or linted.
#   - php-stubs/wordpress-stubs: all WordPress core functions/classes
#   - stubs/wordpress.php: runtime-defined constants (ABSPATH, ARRAY_A, ...) that
#     the stubs package documents only in PHPDoc, so Mago needs real definitions.
#   - stubs/awpt-external.php: non-core symbols (AI Client connectors, Vite).
# NOTE: do not add "vendor/**" to excludes below — it would shadow the stubs package.
includes = [
    "vendor/php-stubs/wordpress-stubs",
    "stubs/wordpress.php",
    "stubs/awpt-external.php",
]
# Type refinements for WordPress core symbols (wpdb return types, REST params).
# Patches take precedence over includes and built-ins during analysis.
patches = ["patches/wordpress.php"]
excludes = ["build/**", "node_modules/**"]

[source.glob]
literal-separator = true

[formatter]
preset = "default"
function-brace-style = "same-line"
method-brace-style = "same-line"
classlike-brace-style = "same-line"

[linter]
integrations = ["wordpress"]

[linter.rules]
no-global = { enabled = false }
no-empty = { level = "warning" }
# Raised so related logic can live together instead of file-per-method micro-classes.
# Scores are class-level control-flow heuristics, not security gates.
kan-defect = { threshold = 8, level = "warning" }
cyclomatic-complexity = { threshold = 60, level = "warning" }
too-many-methods = { threshold = 25, level = "warning" }
no-db-schema-change = { enabled = false }
no-else-clause = { enabled = false }
no-direct-db-query = { enabled = false }
literal-named-argument = { enabled = false }
halstead = { effort-threshold = 8000, volume-threshold = 1500 }

[analyzer]
baseline = "analyzer-baseline.toml"
check-missing-type-hints = false
strict-array-index-existence = false
